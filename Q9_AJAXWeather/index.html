<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <style>
        h1{
            text-align: center;
            padding: 10px;
            margin: 10px;
        }
       #card{
        display: flex;
        flex-wrap: wrap ;
        justify-content: center;
        margin: 20px;
        padding: 10px;
        box-shadow: 1px 1px  1px 1px grey;
       }
       input{
        margin: 5px;
        padding: 10px;

       }
#list {
    width: fit-content;
    margin: 20px auto;   /* center horizontally */
    padding: 10px 15px;

    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    background-color: #f9f9f9;
}
    </style>
</head>
<body>

<h1>Welcome to Weather App</h1>

<div id="card">

    <input type="text" placeholder="City Name" id="city">
    <button onclick="getWeather()">Get Weather</button>
</div>

<div id="list"></div>

<script>
function getWeather() {

    let city = document.getElementById('city').value.trim();
    const container = document.getElementById("list");

    if(city === "") {
        alert("Please enter city name");
        return;
    }

    city = city.charAt(0).toUpperCase() + city.slice(1).toLowerCase();

    let xhr = new XMLHttpRequest();

    xhr.open("GET", "data.json", true);

    xhr.onload = function() {
        if (xhr.status == 200) {

            const data = JSON.parse(xhr.responseText);

            if (data[city]) {
                container.innerHTML = `
                    <p><b>City:</b> ${city}</p>
                    <p><b>Temperature:</b> ${data[city].temp}</p>
                    <p><b>Humidity:</b> ${data[city].humidity}</p>
                    <p><b>Condition:</b> ${data[city].desc}</p>
                `;
            } else {
                container.innerHTML = "City not found!";
            }

        } else {
            container.innerHTML = "Server Error!";
        }
    };

    xhr.send();
}
</script>

</body>
</html>
