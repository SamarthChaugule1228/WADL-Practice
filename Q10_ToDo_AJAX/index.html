<!DOCTYPE html>
<html>
<head>
    <title>Simple To-Do</title>
</head>
<body>

<h2>To-Do List</h2>

<input id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
let tasks = JSON.parse(localStorage.getItem("todos")) || [];

// just to show XMLHttpRequest usage
function ajax() {
    let xhr = new XMLHttpRequest();
    xhr.open("GET", "data.json", true);
    xhr.send();
}

// display
function show() {
    document.getElementById("list").innerHTML =
        tasks.map((t, i) => `
            <li>
                ${t}
                <button onclick="del(${i})">X</button>
                <button onclick="edit(${i})">Edit</button>
            </li>
        `).join("");
}

// add
function addTask() {
    let val = document.getElementById("task").value;
    if (val === "") return alert("Enter task");

    ajax(); // AJAX call

    tasks.push(val);
    localStorage.setItem("todos", JSON.stringify(tasks));
    show();
}

// delete
function del(i) {
    ajax();

    tasks.splice(i, 1);
    localStorage.setItem("todos", JSON.stringify(tasks));
    show();
}

// update
function edit(i) {
    let newVal = prompt("Edit task:", tasks[i]);
    if (!newVal) return;

    ajax();

    tasks[i] = newVal;
    localStorage.setItem("todos", JSON.stringify(tasks));
    show();
}

// initial load
show();
</script>

</body>
</html>
