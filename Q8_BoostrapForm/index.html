<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    body {
      background-color: #f4d0c8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }



    .form-title {
      background-color: #ffffcc;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      font-size: 1.4rem;
      color: red;
      border-bottom: 4px solid white;
    }

    .form-row {
      display: flex;
      border-bottom: 4px solid white;
    }

    .form-label-cell {
      background-color: #00bcd4;
      color: #000;
      padding: 8px 10px;
      width: 140px;
      min-width: 140px;
      display: flex;
      align-items: center;
      font-size: 0.9rem;
      border-right: 4px solid white;
    }

    .form-input-cell {
      background-color: #00bcd4;
      padding: 8px 10px;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .form-input-cell input[type="text"],
    .form-input-cell input[type="password"],
    .form-input-cell textarea,
    .form-input-cell select {
      width: 100%;
      border: 1px solid #aaa;
      padding: 4px 6px;
      background: white;
      font-size: 0.9rem;
    }

    .form-input-cell textarea {
      resize: vertical;
      height: 70px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
      font-size: 0.9rem;
      color: #000;
    }

    .radio-group {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      margin: 0;
    }

    .file-row {
      background-color: #00bcd4;
      padding: 8px 10px;
      border-bottom: 4px solid white;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-wrapper {
      border: 2px solid white;
      width: 380px;
      background-color: white;
    }

    .file-row input[type="file"] {
      font-size: 0.85rem;
    }

    .btn-row {
      background-color: #00bcd4;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      gap: 8px;
    }

    .btn-row button {
      flex: 1;
      padding: 6px 0;
      font-size: 0.9rem;
      border: 1px solid #999;
      background-color: #e0e0e0;
      cursor: pointer;
      border-radius: 2px;
    }

    .btn-row button:hover {
      background-color: #cfcfcf;
    }
  </style>
</head>
<body>

  <div class="form-wrapper">
    <div class="form-title">User Form</div>

    <!-- Name -->
    <div class="form-row">
      <div class="form-label-cell">Enter Name</div>
      <div class="form-input-cell">
        <input type="text" id="name" />
      </div>
    </div>

    <!-- Password -->
    <div class="form-row">
      <div class="form-label-cell">Enter Password</div>
      <div class="form-input-cell">
        <input type="password" id="password" />
      </div>
    </div>

    <!-- Address -->
    <div class="form-row">
      <div class="form-label-cell">Enter Address</div>
      <div class="form-input-cell">
        <textarea id="address"></textarea>
      </div>
    </div>

    <!-- Select Game -->
    <div class="form-row">
      <div class="form-label-cell">Select Game</div>
      <div class="form-input-cell">
        <div class="checkbox-group">
          <label><input type="checkbox" name="game" value="Hockey" /> Hockey</label>
          <label><input type="checkbox" name="game" value="Football" /> Football</label>
          <label><input type="checkbox" name="game" value="Badminton" /> Badminton</label>
          <label><input type="checkbox" name="game" value="Cricket" /> Cricket</label>
          <label><input type="checkbox" name="game" value="Volleyball" /> Volleyball</label>
        </div>
      </div>
    </div>

    <!-- Gender -->
    <div class="form-row">
      <div class="form-label-cell">Gender</div>
      <div class="form-input-cell">
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Male" checked /> Male</label>
          <label><input type="radio" name="gender" value="Female" /> Female</label>
        </div>
      </div>
    </div>

    <!-- Age -->
    <div class="form-row">
      <div class="form-label-cell">Select ur age</div>
      <div class="form-input-cell">
        <select id="age">
          <option value="">Select</option>
          <option value="under18">Under 18</option>
          <option value="18-25">18 - 25</option>
          <option value="26-35">26 - 35</option>
          <option value="36-50">36 - 50</option>
          <option value="50+">50+</option>
        </select>
      </div>
    </div>

    <!-- File Upload -->
    <div class="file-row">
      <input type="file" id="fileUpload" />
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button type="button" onclick="alert('Button Clicked!')">Click Me</button>
      <button type="reset">Reset</button>
      <button type="submit">Submit Form</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
