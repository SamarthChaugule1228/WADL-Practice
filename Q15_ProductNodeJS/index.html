<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>

    <style>
        body {
            font-family: Arial;
        }

        .catalog {
            display: flex;
            gap: 10px;
            margin: 20px;
            flex-wrap: wrap;
        }

        .card {
            padding: 10px;
            border: 1px solid black;
            text-align: center;
            border-radius: 8px;
            width: 180px;
            box-shadow: 2px 2px 8px gray;
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <h2>Welcome to Product Management</h2>

    <div id="productList" class="catalog">
        Product Loading...
    </div>

    <script>
        async function fetchData() {
            try {
                const container = document.getElementById("productList");

                const response = await fetch("http://localhost:3000/api/products");
                const data = await response.json();

                container.innerHTML = data.map(p => `
                    <div class="card">
                        <img src="${p.image}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p>₹ ${p.price}</p>
                    </div>
                `).join('');

            } catch (err) {
                document.getElementById("productList").innerHTML = "Error: No Data Found";
            }
        }

        fetchData();
    </script>

</body>
</html>
