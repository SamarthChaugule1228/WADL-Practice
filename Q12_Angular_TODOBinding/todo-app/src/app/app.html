<h2>TODO List </h2>

<input type="text" [(ngModel)]="task" placeholder="Enter the Todo list ">

<button  (click)="addTask()">
{{ editIndex == -1 ? 'Add' : 'Update'}}
</button>

<ul>
  <li *ngFor="let t of tasks ; let i = index ">
    {{t}}
    <button (click)="edit(i)">Edit</button>
    <button (click)="delete(i)">delete</button>

  </li>
</ul>
